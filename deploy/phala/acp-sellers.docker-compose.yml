      VENICE_MODEL: "${VENICE_MODEL:-minimax-m27}"
      VENICE_MODEL_RIKO: "${VENICE_MODEL_RIKO:-minimax-m27}"
      VENICE_REASONING_EFFORT: "${VENICE_REASONING_EFFORT:-medium}"

