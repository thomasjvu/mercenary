name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: API Tests
        run: pnpm --filter @bossraid/api test

      - name: Orchestrator Tests
        run: pnpm --filter @bossraid/orchestrator test
